name: integrity

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipeline-integrity:
    name: Pipeline integrity
    runs-on: ubuntu-latest
    env:
      NXF_DISABLE_CHECK_LATEST: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          mkdir -p "$HOME/.local/bin"
          mv nextflow "$HOME/.local/bin/nextflow"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate Nextflow config
        run: nextflow config -flat . > /dev/null

      - name: Compile workflow graph
        run: nextflow run main.nf --help -ansi-log false > /dev/null
